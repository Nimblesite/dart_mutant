# agent-pmo:5547fd2
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match required format vMAJOR.MINOR.PATCH (e.g. v0.1.1)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version $VERSION from tag $TAG"

      - name: Set Cargo.toml version from tag
        shell: bash
        run: |
          # Replace the first `version = "..."` line in Cargo.toml with the tag version.
          # This is intentionally not committed back to main — the tag is the source of truth.
          # The address `1,/.../` matches from line 1 until the first match; combined with
          # an explicit substitute pattern this works on both BSD sed (macOS) and GNU sed.
          # The `^version = ` anchor ensures we don't touch dependency `version = "..."` entries.
          sed -i.bak -E '1,/^version = ".*"/ s|^version = ".*"|version = "'"$VERSION"'"|' Cargo.toml
          rm Cargo.toml.bak
          grep '^version' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary version matches tag (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ACTUAL=$(./target/${{ matrix.target }}/release/dart_mutant --version)
          echo "Binary reports: $ACTUAL"
          if ! echo "$ACTUAL" | grep -q "$VERSION"; then
            echo "::error::Binary version '$ACTUAL' does not contain tag version '$VERSION'"
            exit 1
          fi

      - name: Verify binary version matches tag (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          ACTUAL=$(./target/${{ matrix.target }}/release/dart_mutant.exe --version)
          echo "Binary reports: $ACTUAL"
          if ! echo "$ACTUAL" | grep -q "$VERSION"; then
            echo "::error::Binary version '$ACTUAL' does not contain tag version '$VERSION'"
            exit 1
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../dart_mutant-${{ github.ref_name }}-${{ matrix.target }}.tar.gz dart_mutant
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/dart_mutant.exe" -DestinationPath "dart_mutant-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dart_mutant-${{ matrix.target }}
          path: dart_mutant-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Nimblesite/homebrew-tap
          token: ${{ secrets.BREW_SCOOP_PAT }}

      - name: Download release asset and get SHA256
        run: |
          curl -L -o dart_mutant.tar.gz "https://github.com/Nimblesite/dart_mutant/releases/download/${{ github.ref_name }}/dart_mutant-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
          SHA256=$(shasum -a 256 dart_mutant.tar.gz | cut -d ' ' -f 1)
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          VERSION_NUM="${{ github.ref_name }}"
          VERSION_NUM="${VERSION_NUM#v}"
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_ENV

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cat > Formula/dart_mutant.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class DartMutant < Formula
            desc "Mutation testing tool for Dart using tree-sitter AST parsing"
            homepage "https://github.com/Nimblesite/dart_mutant"
            license "MIT"
            version "${VERSION_NUM}"

            on_macos do
              on_arm do
                url "https://github.com/Nimblesite/dart_mutant/releases/download/${VERSION}/dart_mutant-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256}"
              end
            end

            def install
              bin.install "dart_mutant"
            end

            test do
              assert_match "dart_mutant", shell_output("\#{bin}/dart_mutant --version")
            end
          end
          FORMULA
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/dart_mutant.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dart_mutant.rb
          git commit -m "Update dart_mutant to ${{ github.ref_name }}"
          git push

  update-scoop:
    name: Update Scoop Manifest
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: Nimblesite/scoop-bucket
          token: ${{ secrets.BREW_SCOOP_PAT }}

      - name: Download release asset and compute SHA256
        run: |
          ASSET_URL="https://github.com/Nimblesite/dart_mutant/releases/download/${{ github.ref_name }}/dart_mutant-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          curl -L -o dart_mutant.zip "$ASSET_URL"
          SHA256=$(sha256sum dart_mutant.zip | cut -d ' ' -f 1)
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "ASSET_URL=$ASSET_URL" >> "$GITHUB_ENV"
          VERSION_NUM="${{ github.ref_name }}"
          VERSION_NUM="${VERSION_NUM#v}"
          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"

      - name: Write manifest
        run: |
          mkdir -p bucket
          jq -n \
            --arg version "$VERSION_NUM" \
            --arg url "$ASSET_URL" \
            --arg hash "$SHA256" \
            '{
              version: $version,
              description: "Mutation testing tool for Dart using tree-sitter AST parsing",
              homepage: "https://dartmutant.dev",
              license: "MIT",
              architecture: {
                "64bit": {
                  url: $url,
                  hash: $hash,
                  bin: "dart_mutant.exe"
                }
              },
              checkver: {
                github: "https://github.com/Nimblesite/dart_mutant"
              },
              autoupdate: {
                architecture: {
                  "64bit": {
                    url: "https://github.com/Nimblesite/dart_mutant/releases/download/v$version/dart_mutant-v$version-x86_64-pc-windows-msvc.zip"
                  }
                }
              }
            }' > bucket/dart_mutant.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/dart_mutant.json
          # Remove the placeholder if it still exists
          git rm -f bucket/.gitkeep 2>/dev/null || true
          git commit -m "Update dart_mutant to ${{ github.ref_name }}"
          git push

  deploy-website:
    name: Deploy Website
    needs: [update-homebrew, update-scoop]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-pages.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
